services:
  redis:
    image: redis:latest
    container_name: testovoe-redis
    restart: always
    volumes:
      - redis_data:/data
    ports: 
      - 6379:6379
    networks:
      - services
  postgres:
    image: postgres:16.11
    container_name: testovoe-postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5430:5432" 
    networks:
      - services 
networks:
  services:
volumes:
  postgres_data:
  redis_data:
